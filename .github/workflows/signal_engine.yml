name: SignalPro — Live Signal Engine

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  run-signals:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Repo checkout
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Dependencies install
        run: pip install requests pandas numpy --quiet

      - name: Signal engine run karo
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHANNEL:    ${{ secrets.TELEGRAM_CHANNEL }}
        run: python signal_engine_simple.py

      - name: Run summary
        if: always()
        run: echo "Scan complete at $(date -u)"
